<svg id='logo-svg' viewBox='0 0 85 40' width='85' height='40px' preserveAspectRatio='xMidYMid meet'>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200;300;400&display=swap');

      .logo-color {
        fill: var(--brand-faded-jade, #45767a);
      }
      .logo-text {
        font-family: 'Nunito Sans', sans-serif;
        text-anchor: middle;
      }
      .logo-text--outer {
        font-weight: 300;
        font-size: 15px;
        letter-spacing: 5.5px;
      }
      .line {
        transform-origin: center center;
        animation: none;
        stroke: var(--brand-faded-jade, #45767a);
        shape-rendering: crispEdges;
        will-change: transform;
        backface-visibility: hidden;
      }
      svg:hover .line {
        animation: line-expand 700ms ease forwards;
      }
      @keyframes line-expand {
        from { transform: scaleX(0); }
        to   { transform: scaleX(1); }
      }
    </style>
  </defs>

  <!-- SHELBY -->
  <text x='45' y='15' class='logo-color logo-text logo-text--outer'>SHELBY</text>

  <!-- line -->
  <line id='logo-line' class='line' x1='0' y1='20' x2='85' y2='20' stroke-width='1'/>

  <!-- rect cutout over line inside v -->
  <rect x='35.6' y='19' width='13.5' height='2'/>

  <!-- LE -->
  <text x='20' y='35.5' class='logo-color logo-text logo-text--outer'>LE</text>

  <!-- v drawn last to sit on top -->
  <text x='42.5' y='35.8' class='logo-color logo-text' font-weight='200' font-size='23'>V</text>

  <!-- EL -->
  <text x='69.7' y='35.5' class='logo-color logo-text logo-text--outer'>EL</text>
</svg>