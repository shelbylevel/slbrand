meta:
  name: shelbylevel
  link: https://www.shelbylevel.org

color:
  palette:
    deep-jade: "#254D56"
    faded-jade: "#45767a"
    faded-jade-50: "#a2bbbd"
    faded-jade-10: "#ecf1f2"
    gulfstream: "#7fa6ad"
    edgewater: "#d3dfdd"
    edgewater-20: "#dce5e4"
    cascade: "#b3c2c9"
    boulder: "#727E70"
    spring-rain: "#b2c5b4"
    timberwolf: "#D8D5CE"
    timberwolf-50: "#eceae7"
    almond-dust: "#B8AEA8"
    moonstone: "#969996"
    storm-cloud: "#64635E"
    plum-crazy: "#59224A"
  
  foreground: "#000000"         # main text color
  background: "#ffffff"         # background
  primary: "#45767a"            # primary brand color
  secondary: "#7fa6ad"          # secondary accent
  tertiary: "#a2bbbd"           # tertiary accent
  success: "#727E70"            # success states
  info: "#b2c5b4"               # info messages
  warning: "#B8AEA8"            # warnings
  danger: "#6f4a64"             # errors/danger
  light: "#ecf1f2"              # light backgrounds
  dark: "#64635E"               # dark elements

typography:
  fonts:
    - family: "Lato"
      source: google
      weight: [200, 300, 400, 600]
    - family: "Nunito Sans"
      source: google
      weight: [400, 600]
  
  base:
    family: "Lato"
    size: "1rem"
    line-height: 1.6
    weight: 300
    # color: foreground
  
  headings:
    family: "Nunito Sans"
    style: normal
    weight: 600
    line-height: 1.2
    color: primary
    # text-transform: uppercase

defaults:
  bootstrap:
    # defaults: # defaults also supports a string as its value
    #   navbar-light-hover-color: $brand-faded_jade
  shiny:
    defaults:
      navbar-light-hover-color: $brand-faded-jade
    theme:
      preset: shiny # base
      rules: | # CSS rules
        /* Remove flex from tab content */
        .tab-pane.html-fill-container {
          display: block !important;
        }

        /* Ensure inactive tabs are hidden */
        .tab-pane:not(.active) {
          display: none !important;
        }
      
        .tab-pane.active {
          display: block !important;
        }
      
        /* Remove equal-height rows in grid */
        .bslib-grid {
          grid-auto-rows: auto !important;
        }
      
        /* Remove gap spacing between grid items */
        .bslib-gap-spacing {
          gap: 0 !important;
        }
      
        /* Remove fixed heights, let cards expand naturally */
        .bslib-page-navbar .tab-content {
          height: auto !important;
          overflow-y: visible !important;
        }
      
        .card {
          height: auto !important;
          min-height: auto !important;
          max-height: none !important;
        }
      
        .card-body {
          height: auto !important;
          min-height: auto !important;
          overflow-y: visible !important;
        }
      
        /* Ensure page scrolls normally */
        body, html {
          height: auto;
          overflow-y: auto;
        }
      
        .bslib-page-navbar {
          height: auto !important;
          min-height: 100vh;
        }
