<template id="sl-logo-template">
    <svg id='logo-svg' viewBox='0 0 85 40' preserveAspectRatio='xMidYMid meet'
        style='height: 60px; width: auto; max-width: 100%;' role='img' aria-label='Shelby Level'>
        <defs>
            <style>
                @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200;300;400&display=swap');

                .logo-color {
                    fill: var(--brand-faded-jade, #45767a);
                }

                .logo-text {
                    font-family: 'Nunito Sans', sans-serif;
                    text-anchor: middle;
                    font-weight: 300;
                    font-size: 15px;
                }

                .logo-text-v {
                    font-weight: 200;
                    font-size: 23px;
                }

                .line {
                    transform-origin: center center;
                    animation: none;
                    stroke: var(--brand-faded-jade, #45767a);
                    shape-rendering: crispEdges;
                    will-change: transform;
                    backface-visibility: hidden;
                }

                svg:hover .line {
                    animation: line-expand 700ms ease forwards;
                }

                @keyframes line-expand {
                    from {
                        transform: scaleX(0);
                    }

                    to {
                        transform: scaleX(1);
                    }
                }
            </style>
        </defs>
        <!-- SHELBY -->
        <text x='42.5' y='15' textLength='84' class='logo-color logo-text'>SHELBY</text>
        <line id='logo-line' class='line' x1='0' y1='20' x2='85' y2='20' stroke-width='1' />
        <rect x='35.6' y='19' width='13.5' height='2' />
        <text x='17.5' y='35.5' textLength='23' class='logo-color logo-text'>LE</text>
        <text x='42.5' y='35.8' class='logo-color logo-text logo-text-v'>V</text>
        <text x='67' y='35.5' textLength='23' class='logo-color logo-text'>EL</text>
    </svg>
</template>

<script>
    function syncLogoRectColor() {
        const navbar = document.querySelector(".navbar");
        const rect = document.querySelector("#logo-svg rect");
        if (navbar && rect) {
            rect.setAttribute("fill", getComputedStyle(navbar).backgroundColor);
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        const tpl = document.getElementById("sl-logo-template");
        const brand = document.querySelector(".navbar-brand");
        if (brand && tpl) {
            brand.innerHTML = tpl.innerHTML;
            syncLogoRectColor();
        }
    });

    document.addEventListener("quarto-color-scheme-changed", syncLogoRectColor);
</script>
